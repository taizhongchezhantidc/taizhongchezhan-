<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>巡場啟動</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    :root {
      color-scheme: light;
      font-family: "Noto Sans TC", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    body {
      margin: 0;
      background: #f5f7fb;
      color: #1f2937;
    }
    .wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      box-sizing: border-box;
    }
    .card {
      width: 100%;
      max-width: 520px;
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,.08);
      padding: 24px;
      box-sizing: border-box;
    }
    h1 {
      font-size: 28px;
      margin: 0 0 12px;
    }
    .muted {
      color: #6b7280;
      line-height: 1.7;
      margin: 0 0 20px;
    }
    .site-box {
      background: #f3f4f6;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 18px;
    }
    .label {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 6px;
    }
    .value {
      font-size: 24px;
      font-weight: 700;
      word-break: break-word;
    }
    button {
      width: 100%;
      border: 0;
      border-radius: 14px;
      padding: 16px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 10px;
    }
    .primary {
      background: #06c755;
      color: white;
    }
    .secondary {
      background: #e5e7eb;
      color: #111827;
    }
    .status {
      margin-top: 16px;
      font-size: 14px;
      line-height: 1.7;
      white-space: pre-wrap;
      color: #374151;
    }
    .ok { color: #047857; }
    .err { color: #b91c1c; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>巡場啟動</h1>
      <p class="muted">掃描 QR 後，按下按鈕即可把巡場點送到 LINE 聊天室，接著就能直接回覆狀態與上傳照片。</p>

      <div class="site-box">
        <div class="label">巡場點代碼</div>
        <div class="value" id="siteCode">讀取中...</div>
      </div>

      <button class="primary" id="sendBtn" disabled>送出巡場點到 LINE</button>
      <button class="secondary" id="closeBtn" type="button">關閉</button>

      <div class="status" id="status">正在初始化 LIFF...</div>
    </div>
  </div>

  <script>
    const LIFF_ID = '2009710295-JMbggFav';

    function getSiteFromQuery() {
      const params = new URLSearchParams(window.location.search);
      const site = (params.get('site') || '').trim().toUpperCase();
      return site;
    }

    function setStatus(message, type = '') {
      const el = document.getElementById('status');
      el.textContent = message;
      el.className = 'status ' + type;
    }

    async function main() {
      const site = getSiteFromQuery();
      const siteCodeEl = document.getElementById('siteCode');
      const sendBtn = document.getElementById('sendBtn');
      const closeBtn = document.getElementById('closeBtn');

      siteCodeEl.textContent = site || '未提供 site 參數';

      closeBtn.addEventListener('click', () => {
        if (window.liff) {
          liff.closeWindow();
        } else {
          window.close();
        }
      });

      if (!site) {
        setStatus('缺少巡場點代碼。請把 QR 內容做成：\nhttps://liff.line.me/2009710295-JMbggFav?site=A01', 'err');
        return;
      }

      try {
        await liff.init({ liffId: LIFF_ID });
      } catch (err) {
        setStatus('LIFF 初始化失敗：' + (err?.message || err), 'err');
        return;
      }

      if (!liff.isLoggedIn()) {
        setStatus('正在登入 LINE...');
        liff.login();
        return;
      }

      sendBtn.disabled = false;
      setStatus('初始化完成，按下按鈕即可送出：巡場:' + site);

      sendBtn.addEventListener('click', async () => {
        sendBtn.disabled = true;
        setStatus('正在送出巡場點...');

        try {
          if (!liff.isInClient()) {
            throw new Error('目前不是在 LINE App 內開啟，無法直接送訊息到聊天室。');
          }

          await liff.sendMessages([
            {
              type: 'text',
              text: `巡場:${site}`
            }
          ]);

          setStatus('已送出成功，請回到聊天室繼續輸入狀態與上傳照片。', 'ok');

          setTimeout(() => {
            liff.closeWindow();
          }, 900);
        } catch (err) {
          sendBtn.disabled = false;
          setStatus('送出失敗：' + (err?.message || err), 'err');
        }
      });
    }

    main();
  </script>
</body>
</html>
