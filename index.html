<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>巡場啟動</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    :root {
      color-scheme: light;
      font-family: "Noto Sans TC", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #f3f4f6;
      color: #1f2937;
    }

    .wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 620px;
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      padding: 28px;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 28px;
      color: #0f2747;
    }

    .desc {
      margin: 0 0 24px;
      color: #64748b;
      line-height: 1.8;
      font-size: 16px;
    }

    .site-box {
      background: #f3f4f6;
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .label {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 8px;
    }

    .value {
      font-size: 24px;
      font-weight: 800;
      color: #0f2747;
      word-break: break-word;
    }

    button {
      width: 100%;
      border: 0;
      border-radius: 16px;
      padding: 18px;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      transition: transform .05s ease, opacity .2s ease;
    }

    button:active {
      transform: scale(0.99);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.65;
    }

    .primary {
      background: #06c755;
      color: #fff;
      margin-bottom: 14px;
    }

    .secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .status {
      margin-top: 22px;
      font-size: 15px;
      line-height: 1.8;
      white-space: pre-wrap;
    }

    .status.ok {
      color: #047857;
    }

    .status.err {
      color: #b91c1c;
    }

    .hint {
      margin-top: 16px;
      font-size: 14px;
      color: #6b7280;
      line-height: 1.8;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>巡場啟動</h1>
      <p class="desc">
        掃描 QR 後，按下按鈕即可把巡場點送到 LINE 聊天室，接著就能直接回覆狀態與上傳照片。
      </p>

      <div class="site-box">
        <div class="label">巡場點代碼</div>
        <div class="value" id="siteCode">讀取中...</div>
      </div>

      <button class="primary" id="sendBtn" disabled>送出巡場點到 LINE</button>
      <button class="secondary" id="closeBtn" type="button">關閉</button>

      <div class="status" id="status">正在初始化 LIFF...</div>
      <div class="hint" id="hint"></div>
    </div>
  </div>

  <script>
    const LIFF_ID = '2009710295-JMbggFav';

    function setStatus(message, type = '') {
      const el = document.getElementById('status');
      el.textContent = message;
      el.className = 'status' + (type ? ' ' + type : '');
    }

    function setHint(message = '') {
      document.getElementById('hint').textContent = message;
    }

    function normalizeSite(value) {
      return String(value || '').trim().toUpperCase();
    }

    function getSiteFromQuery() {
      const outerParams = new URLSearchParams(window.location.search);

      // 1. 先找一般參數 ?site=A01
      let site = normalizeSite(outerParams.get('site'));
      if (site) return site;

      // 2. 再找 LIFF 包進來的 liff.state
      const liffState = outerParams.get('liff.state') || '';
      if (liffState) {
        let stateString = liffState.trim();

        // 常見型態：?site=A01
        if (stateString.startsWith('?')) {
          stateString = stateString.slice(1);
        }

        // 保險處理一些可能出現的形式
        if (stateString.startsWith('/?')) {
          stateString = stateString.slice(2);
        } else if (stateString.startsWith('/')) {
          stateString = stateString.slice(1);
        }

        const innerParams = new URLSearchParams(stateString);
        site = normalizeSite(innerParams.get('site'));
        if (site) return site;
      }

      return '';
    }

    async function main() {
      const siteCodeEl = document.getElementById('siteCode');
      const sendBtn = document.getElementById('sendBtn');
      const closeBtn = document.getElementById('closeBtn');

      const site = getSiteFromQuery();
      siteCodeEl.textContent = site || '未提供 site 參數';

      closeBtn.addEventListener('click', () => {
        if (window.liff && typeof liff.closeWindow === 'function') {
          liff.closeWindow();
        } else {
          window.close();
        }
      });

      if (!site) {
        setStatus('缺少巡場點代碼。', 'err');
        setHint('請把 QR 內容做成：https://liff.line.me/2009710295-JMbggFav?site=A01');
        return;
      }

      try {
        await liff.init({ liffId: LIFF_ID });
      } catch (err) {
        setStatus('LIFF 初始化失敗：' + (err?.message || String(err)), 'err');
        return;
      }

      if (!liff.isLoggedIn()) {
        setStatus('正在登入 LINE...');
        liff.login();
        return;
      }

      sendBtn.disabled = false;
      setStatus('初始化完成，按下按鈕即可送出：巡場:' + site);
      setHint('');

      sendBtn.addEventListener('click', async () => {
        sendBtn.disabled = true;
        setStatus('正在送出巡場點...');

        try {
          if (!liff.isInClient()) {
            throw new Error('目前不是在 LINE App 內開啟，無法直接送訊息到聊天室。請從 LINE 內開啟此 LIFF。');
          }

          await liff.sendMessages([
            {
              type: 'text',
              text: `巡場:${site}`
            }
          ]);

          setStatus('已送出成功，請回到聊天室繼續輸入狀態與上傳照片。', 'ok');

          setTimeout(() => {
            liff.closeWindow();
          }, 900);
        } catch (err) {
          sendBtn.disabled = false;
          setStatus('送出失敗：' + (err?.message || String(err)), 'err');
        }
      });
    }

    main();
  </script>
</body>
</html>
